services:
    sqwok:
        image: local/sqwok:latest
        build: .
        environment:
            SQWOK_SERVER: http://host.docker.internal:4000 # https://api.sqwok.io
        volumes:
            - sqwok-data:/home/sqwok/.sqwok
            - sqwok-identity:/home/sqwok/.local/share/sqwok

volumes:
    sqwok-data:
    sqwok-identity:
