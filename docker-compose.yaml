services:
    sqwok:
        image: local/sqwok:latest
        build: .
        environment:
            SQWOK_SERVER: https://sqwok.fixbase.io # http://host.docker.internal:4000
        volumes:
            - sqwok-data:/home/sqwok/.sqwok
            - sqwok-identity:/home/sqwok/.local/share/sqwok

volumes:
    sqwok-data:
    sqwok-identity:
